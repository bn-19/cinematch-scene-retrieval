name: Deploy to Hugging Face Space

"on":
  push:
    branches:
      - main
    paths:
      - "cinematch/**"
      - ".github/workflows/deploy-huggingface.yml"
  workflow_dispatch:

concurrency:
  group: huggingface-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hugging Face Hub client
        run: python -m pip install --upgrade huggingface_hub

      - name: Upload app to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)

          info = api.upload_folder(
              repo_id="bn19/cinematch-scene-retrieval",
              repo_type="space",
              folder_path="cinematch",
              commit_message="Deploy from GitHub Actions",
              ignore_patterns=[
                  "__pycache__/**",
                  "*.pyc",
                  ".DS_Store",
                  ".claude/**",
                  "data/chromadb_store/**",
              ],
              delete_patterns=[
                  "__pycache__/**",
                  "*.pyc",
                  ".DS_Store",
                  ".claude/**",
                  "data/chromadb_store/**",
              ],
          )

          print(info.commit_url)
          PY
